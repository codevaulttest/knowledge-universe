<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 692 260" fill="none">
  <defs>
    <linearGradient id="gn-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080b16"/>
      <stop offset="52%" stop-color="#0a1330"/>
      <stop offset="100%" stop-color="#0b1d4d"/>
    </linearGradient>
    <radialGradient id="gn-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2f6bff" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#0052ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0052ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gn-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#cfe0ff"/>
      <stop offset="100%" stop-color="#6f9bff"/>
    </radialGradient>
    <linearGradient id="gn-scrim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#080b16" stop-opacity="0.92"/>
      <stop offset="46%" stop-color="#080b16" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#080b16" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="692" height="260" rx="14" fill="url(#gn-bg)"/>

  <!-- subtle editorial grid -->
  <g stroke="#ffffff" stroke-opacity="0.035" stroke-width="1">
    <line x1="0" y1="52" x2="692" y2="52"/>
    <line x1="0" y1="104" x2="692" y2="104"/>
    <line x1="0" y1="156" x2="692" y2="156"/>
    <line x1="0" y1="208" x2="692" y2="208"/>
    <line x1="520" y1="0" x2="520" y2="260"/>
    <line x1="600" y1="0" x2="600" y2="260"/>
    <line x1="440" y1="0" x2="440" y2="260"/>
  </g>

  <!-- glow halo behind the genesis node -->
  <circle cx="520" cy="130" r="150" fill="url(#gn-glow)"/>

  <!-- concentric orbit rings (genesis node motif, matches favicon) -->
  <g fill="none" stroke="#3f78ff">
    <circle cx="520" cy="130" r="118" stroke-opacity="0.12" stroke-width="1"/>
    <circle cx="520" cy="130" r="86"  stroke-opacity="0.18" stroke-width="1"/>
    <circle cx="520" cy="130" r="54"  stroke-opacity="0.30" stroke-width="1.4"/>
  </g>

  <!-- connecting lines to satellite nodes -->
  <g stroke="#3f78ff" stroke-opacity="0.4" stroke-width="1.4">
    <line x1="520" y1="130" x2="438" y2="58"/>
    <line x1="520" y1="130" x2="636" y2="78"/>
    <line x1="520" y1="130" x2="612" y2="206"/>
    <line x1="520" y1="130" x2="426" y2="186"/>
  </g>

  <!-- satellite nodes -->
  <circle cx="438" cy="58"  r="6" fill="#0052ff"/>
  <circle cx="438" cy="58"  r="2.6" fill="#ffffff"/>
  <circle cx="636" cy="78"  r="5" fill="#4d8bff"/>
  <circle cx="612" cy="206" r="6.5" fill="#0052ff" fill-opacity="0.85"/>
  <circle cx="426" cy="186" r="4.5" fill="#4d8bff" fill-opacity="0.8"/>
  <!-- accent satellite (semantic green, echoes favicon) -->
  <circle cx="601" cy="131" r="6" fill="#ffffff"/>
  <circle cx="601" cy="131" r="3" fill="#05b169"/>

  <!-- central genesis node -->
  <circle cx="520" cy="130" r="26" fill="#0052ff" fill-opacity="0.22"/>
  <circle cx="520" cy="130" r="15" fill="url(#gn-core)"/>
  <circle cx="520" cy="130" r="5.5" fill="#0052ff"/>

  <!-- drifting particles -->
  <circle cx="70"  cy="56"  r="1.6" fill="#ffffff" fill-opacity="0.45"/>
  <circle cx="150" cy="210" r="1.4" fill="#4d8bff" fill-opacity="0.5"/>
  <circle cx="300" cy="40"  r="1.4" fill="#ffffff" fill-opacity="0.35"/>
  <circle cx="360" cy="224" r="1.6" fill="#ffffff" fill-opacity="0.3"/>
  <circle cx="668" cy="38"  r="1.6" fill="#4d8bff" fill-opacity="0.5"/>
  <circle cx="660" cy="232" r="1.4" fill="#ffffff" fill-opacity="0.35"/>

  <!-- left scrim for text legibility -->
  <rect width="692" height="260" rx="14" fill="url(#gn-scrim)"/>
</svg>
