      <stop offset="0%" stop-color="#e8eef4"/>
      <stop offset="100%" stop-color="#d0dce8"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d5b8"/>
      <stop offset="100%" stop-color="#c8b090"/>
