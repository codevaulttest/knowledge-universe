<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8faff"/>
      <stop offset="100%" stop-color="#eef2fa"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg4)"/>
  <!-- title -->
  <text x="300" y="60" text-anchor="middle" fill="#2d3a5a" font-size="22" font-weight="700" font-family="sans-serif">季度 OKR 完成率</text>
  <!-- y-axis labels -->
  <text x="55" y="130" text-anchor="end" fill="#8090b0" font-size="13" font-family="sans-serif">100%</text>
  <text x="55" y="210" text-anchor="end" fill="#8090b0" font-size="13" font-family="sans-serif">75%</text>
  <text x="55" y="290" text-anchor="end" fill="#8090b0" font-size="13" font-family="sans-serif">50%</text>
  <text x="55" y="370" text-anchor="end" fill="#8090b0" font-size="13" font-family="sans-serif">25%</text>
  <!-- grid lines -->
  <line x1="65" y1="125" x2="555" y2="125" stroke="#e0e8f0" stroke-width="1"/>
  <line x1="65" y1="205" x2="555" y2="205" stroke="#e0e8f0" stroke-width="1"/>
  <line x1="65" y1="285" x2="555" y2="285" stroke="#e0e8f0" stroke-width="1"/>
  <line x1="65" y1="365" x2="555" y2="365" stroke="#e0e8f0" stroke-width="1"/>
  <line x1="65" y1="445" x2="555" y2="445" stroke="#e0e8f0" stroke-width="1"/>
  <!-- x-axis -->
  <line x1="65" y1="445" x2="555" y2="445" stroke="#c0ccdd" stroke-width="2"/>
  <!-- Q1 bar - 72% -->
  <rect x="90" y="206" width="90" height="239" fill="#5b8df0" rx="6"/>
  <rect x="90" y="200" width="90" height="12" fill="#7aaaf8" rx="4"/>
  <text x="135" y="195" text-anchor="middle" fill="#5b8df0" font-size="16" font-weight="700" font-family="sans-serif">72%</text>
  <text x="135" y="475" text-anchor="middle" fill="#5070a0" font-size="14" font-family="sans-serif">Q1</text>
  <!-- Q2 bar - 58% (worst) -->
  <rect x="215" y="252" width="90" height="193" fill="#e05a6a" rx="6"/>
  <rect x="215" y="246" width="90" height="12" fill="#f07a88" rx="4"/>
  <text x="260" y="241" text-anchor="middle" fill="#e05a6a" font-size="16" font-weight="700" font-family="sans-serif">58%</text>
  <text x="260" y="475" text-anchor="middle" fill="#5070a0" font-size="14" font-family="sans-serif">Q2</text>
  <!-- sad emoji hint for Q2 -->
  <text x="260" y="510" text-anchor="middle" fill="#e05a6a" font-size="18" font-family="sans-serif">😬</text>
  <!-- Q3 bar - 85% -->
  <rect x="340" y="126" width="90" height="319" fill="#44c490" rx="6"/>
  <rect x="340" y="120" width="90" height="12" fill="#64d8a8" rx="4"/>
  <text x="385" y="115" text-anchor="middle" fill="#44c490" font-size="16" font-weight="700" font-family="sans-serif">85%</text>
  <text x="385" y="475" text-anchor="middle" fill="#5070a0" font-size="14" font-family="sans-serif">Q3</text>
  <!-- Q4 bar - 91% -->
  <rect x="465" y="99" width="90" height="346" fill="#f0a030" rx="6"/>
  <rect x="465" y="93" width="90" height="12" fill="#f8b84a" rx="4"/>
  <text x="510" y="88" text-anchor="middle" fill="#f0a030" font-size="16" font-weight="700" font-family="sans-serif">91%</text>
  <text x="510" y="475" text-anchor="middle" fill="#5070a0" font-size="14" font-family="sans-serif">Q4</text>
  <!-- trend line -->
  <polyline points="135,224 260,264 385,138 510,105" fill="none" stroke="#2d3a5a" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <circle cx="135" cy="224" r="5" fill="#5b8df0"/>
  <circle cx="260" cy="264" r="5" fill="#e05a6a"/>
  <circle cx="385" cy="138" r="5" fill="#44c490"/>
  <circle cx="510" cy="105" r="5" fill="#f0a030"/>
</svg>
