<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <!-- Obsidian dark side -->
  <rect width="295" height="600" fill="#1a1b2e"/>
  <!-- Notion light side -->
  <rect x="305" width="295" height="600" fill="#f7f6f3"/>
  <!-- divider -->
  <rect x="293" width="14" height="600" fill="#0a0a18"/>
  <!-- Obsidian header -->
  <rect x="0" y="0" width="295" height="40" fill="#12121f"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="20" r="6" fill="#febc2e"/>
  <circle cx="56" cy="20" r="6" fill="#28c840"/>
  <text x="148" y="26" text-anchor="middle" fill="#888" font-size="12" font-family="monospace">Obsidian</text>
  <!-- Graph view in Obsidian -->
  <circle cx="148" cy="180" r="55" fill="none" stroke="#7c6fe0" stroke-width="1" opacity="0.3"/>
  <circle cx="148" cy="180" r="6" fill="#7c6fe0"/>
  <circle cx="90" cy="140" r="5" fill="#9b8be8" opacity="0.8"/>
  <circle cx="200" cy="130" r="4" fill="#7c6fe0" opacity="0.8"/>
  <circle cx="70" cy="210" r="5" fill="#8a7ae0" opacity="0.7"/>
  <circle cx="210" cy="215" r="6" fill="#7c6fe0" opacity="0.9"/>
  <circle cx="148" cy="240" r="4" fill="#9b8be8" opacity="0.6"/>
  <line x1="148" y1="180" x2="90" y2="140" stroke="#7c6fe0" stroke-width="1.5" opacity="0.5"/>
  <line x1="148" y1="180" x2="200" y2="130" stroke="#7c6fe0" stroke-width="1.5" opacity="0.5"/>
  <line x1="148" y1="180" x2="70" y2="210" stroke="#7c6fe0" stroke-width="1" opacity="0.4"/>
  <line x1="148" y1="180" x2="210" y2="215" stroke="#7c6fe0" stroke-width="1.5" opacity="0.5"/>
  <line x1="148" y1="180" x2="148" y2="240" stroke="#7c6fe0" stroke-width="1" opacity="0.4"/>
  <line x1="90" y1="140" x2="200" y2="130" stroke="#7c6fe0" stroke-width="1" opacity="0.3"/>
  <!-- Obsidian text lines -->
  <rect x="20" y="310" width="180" height="3" fill="#666" rx="1" opacity="0.8"/>
  <rect x="20" y="322" width="140" height="3" fill="#555" rx="1" opacity="0.6"/>
  <rect x="20" y="334" width="160" height="3" fill="#555" rx="1" opacity="0.6"/>
  <rect x="20" y="354" width="100" height="3" fill="#7c6fe0" rx="1" opacity="0.7"/>
  <rect x="20" y="366" width="170" height="3" fill="#444" rx="1" opacity="0.5"/>
  <rect x="20" y="378" width="120" height="3" fill="#444" rx="1" opacity="0.5"/>
  <!-- Notion content -->
  <rect x="320" y="55" width="260" height="30" fill="none"/>
  <text x="450" y="78" text-anchor="middle" fill="#37352f" font-size="20" font-weight="bold" font-family="sans-serif">My Notes</text>
  <!-- Notion page blocks -->
  <rect x="325" y="105" width="255" height="3" fill="#e3e0d8" rx="1"/>
  <rect x="325" y="120" width="200" height="14" fill="#f1efec" rx="3"/>
  <rect x="325" y="120" width="6" height="14" fill="#2eaadc" rx="1"/>
  <rect x="335" y="123" width="120" height="8" fill="#37352f" rx="1" opacity="0.7"/>
  <rect x="325" y="143" width="240" height="12" fill="#f1efec" rx="3"/>
  <rect x="325" y="143" width="6" height="12" fill="#2eaadc" rx="1"/>
  <rect x="335" y="146" width="150" height="6" fill="#37352f" rx="1" opacity="0.5"/>
  <rect x="325" y="164" width="220" height="12" fill="#f1efec" rx="3"/>
  <rect x="325" y="164" width="6" height="12" fill="#2eaadc" rx="1"/>
  <rect x="335" y="167" width="100" height="6" fill="#37352f" rx="1" opacity="0.5"/>
  <!-- Notion database table -->
  <rect x="325" y="195" width="255" height="24" fill="#e8e5de" rx="3"/>
  <text x="345" y="212" fill="#37352f" font-size="11" font-family="sans-serif" font-weight="600">Title</text>
  <text x="430" y="212" fill="#37352f" font-size="11" font-family="sans-serif" font-weight="600">Status</text>
  <text x="510" y="212" fill="#37352f" font-size="11" font-family="sans-serif" font-weight="600">Date</text>
  <rect x="325" y="219" width="255" height="1" fill="#d4d0c8"/>
  <rect x="325" y="220" width="255" height="22" fill="#fff"/>
  <rect x="335" y="226" width="80" height="8" fill="#37352f" rx="1" opacity="0.4"/>
  <rect x="425" y="224" width="44" height="14" fill="#d3f0e3" rx="8"/>
  <text x="447" y="235" text-anchor="middle" fill="#1a8050" font-size="9" font-family="sans-serif">Done</text>
  <rect x="505" y="226" width="55" height="8" fill="#d0d0d0" rx="1" opacity="0.6"/>
  <rect x="325" y="242" width="255" height="22" fill="#fafafa"/>
  <rect x="335" y="248" width="70" height="8" fill="#37352f" rx="1" opacity="0.4"/>
  <rect x="425" y="246" width="50" height="14" fill="#fff3cd" rx="8"/>
  <text x="450" y="257" text-anchor="middle" fill="#856404" font-size="9" font-family="sans-serif">In Progress</text>
  <rect x="325" y="264" width="255" height="22" fill="#fff"/>
  <rect x="335" y="270" width="90" height="8" fill="#37352f" rx="1" opacity="0.4"/>
  <rect x="425" y="268" width="44" height="14" fill="#d3f0e3" rx="8"/>
  <text x="447" y="279" text-anchor="middle" fill="#1a8050" font-size="9" font-family="sans-serif">Done</text>
</svg>
