<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="artbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2a4e"/>
      <stop offset="50%" stop-color="#0e3060"/>
      <stop offset="100%" stop-color="#1a3848"/>
    </linearGradient>
    <linearGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#20d8c8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#20d8c8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#artbg)"/>
  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="100" y1="0" x2="100" y2="420"/>
    <line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="420"/>
    <line x1="500" y1="0" x2="500" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="700" y1="0" x2="700" y2="420"/>
  </g>
  <!-- decorative circles (knowledge nodes) -->
  <circle cx="580" cy="210" r="140" fill="none" stroke="#20d8c8" stroke-width="1" opacity="0.15"/>
  <circle cx="580" cy="210" r="100" fill="none" stroke="#20d8c8" stroke-width="1" opacity="0.2"/>
  <circle cx="580" cy="210" r="60" fill="none" stroke="#20d8c8" stroke-width="1.5" opacity="0.3"/>
  <circle cx="580" cy="210" r="24" fill="#20d8c8" opacity="0.25"/>
  <circle cx="580" cy="210" r="10" fill="#20d8c8" opacity="0.7"/>
  <!-- connecting lines to satellites -->
  <line x1="580" y1="210" x2="480" y2="120" stroke="#20d8c8" stroke-width="1.5" opacity="0.4"/>
  <circle cx="480" cy="120" r="6" fill="#20d8c8" opacity="0.6"/>
  <line x1="580" y1="210" x2="700" y2="140" stroke="#20d8c8" stroke-width="1.5" opacity="0.4"/>
  <circle cx="700" cy="140" r="5" fill="#4ad8f8" opacity="0.6"/>
  <line x1="580" y1="210" x2="680" y2="310" stroke="#20d8c8" stroke-width="1.5" opacity="0.4"/>
  <circle cx="680" cy="310" r="7" fill="#20d8c8" opacity="0.5"/>
  <line x1="580" y1="210" x2="460" y2="300" stroke="#20d8c8" stroke-width="1" opacity="0.3"/>
  <circle cx="460" cy="300" r="5" fill="#20d8c8" opacity="0.5"/>
  <line x1="480" y1="120" x2="700" y2="140" stroke="#20d8c8" stroke-width="0.8" opacity="0.15"/>
  <!-- flying stars/particles -->
  <circle cx="80" cy="80" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="200" cy="50" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="150" cy="350" r="2" fill="#20d8c8" opacity="0.4"/>
  <circle cx="320" cy="380" r="1.5" fill="#fff" opacity="0.3"/>
  <circle cx="760" cy="380" r="2" fill="#20d8c8" opacity="0.4"/>
  <circle cx="740" cy="60" r="1.5" fill="#fff" opacity="0.5"/>
  <!-- open book illustration (left side) -->
  <rect x="40" y="130" width="150" height="190" fill="rgba(255,255,255,0.06)" rx="4 0 0 4" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <rect x="195" y="130" width="150" height="190" fill="rgba(255,255,255,0.08)" rx="0 4 4 0" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <rect x="184" y="130" width="16" height="190" fill="rgba(255,255,255,0.04)"/>
  <line x1="192" y1="130" x2="192" y2="320" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- text lines on left page -->
  <rect x="55" y="160" width="120" height="3" fill="#fff" opacity="0.25" rx="1"/>
  <rect x="55" y="172" width="110" height="3" fill="#fff" opacity="0.2" rx="1"/>
  <rect x="55" y="184" width="120" height="3" fill="#fff" opacity="0.2" rx="1"/>
  <rect x="55" y="196" width="100" height="10" fill="#20d8c8" opacity="0.15" rx="2"/>
  <rect x="55" y="198" width="100" height="3" fill="#fff" opacity="0.3" rx="1"/>
  <rect x="55" y="214" width="115" height="3" fill="#fff" opacity="0.18" rx="1"/>
  <rect x="55" y="226" width="90" height="3" fill="#fff" opacity="0.18" rx="1"/>
  <rect x="55" y="260" width="120" height="3" fill="#fff" opacity="0.15" rx="1"/>
  <rect x="55" y="272" width="105" height="3" fill="#fff" opacity="0.15" rx="1"/>
  <!-- text lines on right page -->
  <rect x="210" y="160" width="120" height="3" fill="#fff" opacity="0.2" rx="1"/>
  <rect x="210" y="172" width="95" height="3" fill="#fff" opacity="0.18" rx="1"/>
  <rect x="210" y="184" width="115" height="3" fill="#fff" opacity="0.18" rx="1"/>
  <rect x="210" y="196" width="100" height="3" fill="#fff" opacity="0.15" rx="1"/>
  <rect x="210" y="225" width="120" height="10" fill="#4ad8f8" opacity="0.1" rx="2"/>
  <rect x="210" y="227" width="120" height="3" fill="#fff" opacity="0.3" rx="1"/>
  <rect x="210" y="243" width="105" height="3" fill="#fff" opacity="0.15" rx="1"/>
  <!-- main heading -->
  <text x="50" y="95" fill="#20d8c8" font-size="13" font-weight="600" font-family="sans-serif" letter-spacing="2" opacity="0.9">KNOWLEDGE · UNIVERSE</text>
  <text x="50" y="118" fill="#fff" font-size="11" font-family="sans-serif" opacity="0.4">一文读懂 RAG 技术</text>
  <!-- floating tags -->
  <rect x="370" y="60" width="80" height="22" fill="rgba(32,216,200,0.15)" rx="11" stroke="#20d8c8" stroke-width="1" opacity="0.6"/>
  <text x="410" y="75" text-anchor="middle" fill="#20d8c8" font-size="11" font-family="sans-serif"># RAG</text>
  <rect x="460" y="58" width="100" height="22" fill="rgba(74,216,248,0.1)" rx="11" stroke="#4ad8f8" stroke-width="1" opacity="0.5"/>
  <text x="510" y="73" text-anchor="middle" fill="#4ad8f8" font-size="11" font-family="sans-serif"># LLM</text>
  <rect x="370" y="340" width="110" height="22" fill="rgba(255,255,255,0.05)" rx="11" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="425" y="355" text-anchor="middle" fill="#fff" font-size="11" font-family="sans-serif" opacity="0.5"># 知识图谱</text>
</svg>
