<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="macbg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#2c3e6e"/>
      <stop offset="60%" stop-color="#1a2a5e"/>
      <stop offset="100%" stop-color="#0e1a48"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#macbg)"/>
  <!-- stars background -->
  <circle cx="50" cy="40" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="130" cy="25" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="250" cy="55" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="380" cy="30" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="500" cy="50" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="560" cy="20" r="1" fill="#fff" opacity="0.5"/>
  <!-- Mac menu bar -->
  <rect x="0" y="0" width="600" height="26" fill="rgba(0,0,0,0.5)"/>
  <text x="14" y="18" fill="#fff" font-size="14" font-weight="700" font-family="sans-serif"></text>
  <text x="50" y="18" fill="#fff" font-size="12" font-family="sans-serif">Finder</text>
  <text x="105" y="18" fill="#fff" font-size="12" font-family="sans-serif">File</text>
  <text x="140" y="18" fill="#fff" font-size="12" font-family="sans-serif">Edit</text>
  <text x="175" y="18" fill="#fff" font-size="12" font-family="sans-serif">View</text>
  <!-- menu bar right icons -->
  <text x="480" y="18" fill="#fff" font-size="12" font-family="sans-serif">🔋 📶 🔊</text>
  <text x="552" y="18" fill="#fff" font-size="11" font-family="sans-serif">14:23</text>
  <!-- Plugin widgets on desktop -->
  <!-- Widget 1: Stats (top-left) -->
  <rect x="20" y="40" width="180" height="110" fill="rgba(255,255,255,0.12)" rx="14" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="30" y="62" fill="#fff" font-size="11" font-weight="600" font-family="sans-serif" opacity="0.7">SYSTEM STATS</text>
  <text x="30" y="86" fill="#5df5c0" font-size="22" font-weight="700" font-family="monospace">CPU 18%</text>
  <text x="30" y="106" fill="#fff" font-size="13" font-family="monospace" opacity="0.7">RAM 6.2 / 16 GB</text>
  <rect x="30" y="120" width="140" height="6" fill="rgba(255,255,255,0.1)" rx="3"/>
  <rect x="30" y="120" width="52" height="6" fill="#5df5c0" rx="3"/>
  <!-- Widget 2: Pomodoro timer -->
  <rect x="215" y="40" width="170" height="110" fill="rgba(255,255,255,0.12)" rx="14" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="225" y="62" fill="#fff" font-size="11" font-weight="600" font-family="sans-serif" opacity="0.7">🍅 POMODORO</text>
  <text x="300" y="105" text-anchor="middle" fill="#ff8c70" font-size="32" font-weight="700" font-family="monospace">24:17</text>
  <text x="300" y="138" text-anchor="middle" fill="#fff" font-size="11" font-family="sans-serif" opacity="0.6">Focus session 3/4</text>
  <!-- Widget 3: Weather -->
  <rect x="400" y="40" width="180" height="110" fill="rgba(255,255,255,0.12)" rx="14" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="410" y="62" fill="#fff" font-size="11" font-weight="600" font-family="sans-serif" opacity="0.7">WEATHER · 深圳</text>
  <text x="420" y="105" fill="#fff" font-size="42" font-family="sans-serif">☀️</text>
  <text x="500" y="95" fill="#fff" font-size="28" font-weight="700" font-family="sans-serif">32°</text>
  <text x="500" y="115" fill="#fff" font-size="11" font-family="sans-serif" opacity="0.6">晴 · 体感 35°</text>
  <!-- Widget 4: Todo list -->
  <rect x="20" y="165" width="180" height="165" fill="rgba(255,255,255,0.12)" rx="14" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="30" y="187" fill="#fff" font-size="11" font-weight="600" font-family="sans-serif" opacity="0.7">TODAY's TASKS</text>
  <text x="30" y="212" fill="#5df5c0" font-size="14" font-family="sans-serif">✓ 写晨间日记</text>
  <text x="30" y="232" fill="#5df5c0" font-size="14" font-family="sans-serif">✓ 健身 30min</text>
  <text x="30" y="252" fill="#fff" font-size="14" font-family="sans-serif" opacity="0.7">○ 回复邮件</text>
  <text x="30" y="272" fill="#fff" font-size="14" font-family="sans-serif" opacity="0.7">○ 写周报</text>
  <text x="30" y="292" fill="#fff" font-size="14" font-family="sans-serif" opacity="0.4">○ Code review</text>
  <text x="30" y="318" fill="#5df5c0" font-size="11" font-family="sans-serif">2 / 5 完成</text>
  <!-- Widget 5: Habit tracker -->
  <rect x="215" y="165" width="170" height="165" fill="rgba(255,255,255,0.12)" rx="14" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="225" y="187" fill="#fff" font-size="11" font-weight="600" font-family="sans-serif" opacity="0.7">HABIT STREAK</text>
  <text x="225" y="215" fill="#fff" font-size="13" font-family="sans-serif">写作 <tspan fill="#ffb84a">🔥 47天</tspan></text>
  <text x="225" y="238" fill="#fff" font-size="13" font-family="sans-serif">运动 <tspan fill="#ffb84a">🔥 23天</tspan></text>
  <text x="225" y="261" fill="#fff" font-size="13" font-family="sans-serif">冥想 <tspan fill="#ffb84a">🔥 15天</tspan></text>
  <text x="225" y="284" fill="#fff" font-size="13" font-family="sans-serif">读书 <tspan fill="#ffb84a">🔥 62天</tspan></text>
  <text x="225" y="307" fill="#fff" font-size="13" font-family="sans-serif">编程 <tspan fill="#ffb84a">🔥 180天</tspan></text>
  <!-- Widget 6: Music -->
  <rect x="400" y="165" width="180" height="165" fill="rgba(255,255,255,0.12)" rx="14" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="410" y="187" fill="#fff" font-size="11" font-weight="600" font-family="sans-serif" opacity="0.7">NOW PLAYING</text>
  <rect x="418" y="200" width="60" height="60" fill="#e85888" rx="8"/>
  <text x="448" y="238" text-anchor="middle" fill="#fff" font-size="26" font-family="sans-serif">♪</text>
  <text x="490" y="218" fill="#fff" font-size="12" font-weight="600" font-family="sans-serif">Lo-Fi Study</text>
  <text x="490" y="235" fill="#fff" font-size="11" font-family="sans-serif" opacity="0.6">ChillHop Music</text>
  <rect x="418" y="275" width="140" height="4" fill="rgba(255,255,255,0.2)" rx="2"/>
  <rect x="418" y="275" width="80" height="4" fill="#e85888" rx="2"/>
  <text x="418" y="300" fill="#fff" font-size="22" font-family="sans-serif">⏮  ⏸  ⏭</text>
  <!-- Widget 7: Clipboard manager -->
  <rect x="20" y="345" width="180" height="130" fill="rgba(255,255,255,0.12)" rx="14" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="30" y="367" fill="#fff" font-size="11" font-weight="600" font-family="sans-serif" opacity="0.7">📋 CLIPBOARD</text>
  <rect x="30" y="378" width="155" height="24" fill="rgba(255,255,255,0.08)" rx="4"/>
  <text x="38" y="394" fill="#fff" font-size="10" font-family="monospace" opacity="0.9">const foo = () =&gt; {}</text>
  <rect x="30" y="408" width="155" height="22" fill="rgba(255,255,255,0.05)" rx="4"/>
  <text x="38" y="423" fill="#fff" font-size="10" font-family="monospace" opacity="0.6">https://github.com/…</text>
  <rect x="30" y="436" width="155" height="22" fill="rgba(255,255,255,0.05)" rx="4"/>
  <text x="38" y="451" fill="#fff" font-size="10" font-family="monospace" opacity="0.5">设计 token 整理完毕</text>
  <!-- Widget 8: Network speed -->
  <rect x="215" y="345" width="170" height="130" fill="rgba(255,255,255,0.12)" rx="14" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="225" y="367" fill="#fff" font-size="11" font-weight="600" font-family="sans-serif" opacity="0.7">⬆⬇ NETWORK</text>
  <text x="225" y="400" fill="#5df5c0" font-size="28" font-weight="700" font-family="monospace">↓ 94</text>
  <text x="225" y="426" fill="#ff8c70" font-size="20" font-weight="700" font-family="monospace">↑ 12 Mbps</text>
  <text x="225" y="450" fill="#fff" font-size="11" font-family="sans-serif" opacity="0.5">Ping 8ms · WiFi -62dBm</text>
  <!-- Widget 9: Screen time -->
  <rect x="400" y="345" width="180" height="130" fill="rgba(255,255,255,0.12)" rx="14" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="410" y="367" fill="#fff" font-size="11" font-weight="600" font-family="sans-serif" opacity="0.7">📊 SCREEN TIME</text>
  <text x="490" y="405" text-anchor="middle" fill="#fff" font-size="26" font-weight="700" font-family="monospace">4h 23m</text>
  <text x="490" y="425" text-anchor="middle" fill="#fff" font-size="11" font-family="sans-serif" opacity="0.5">今日使用</text>
  <rect x="418" y="435" width="140" height="8" fill="rgba(255,255,255,0.1)" rx="4"/>
  <rect x="418" y="435" width="90" height="8" fill="#5df5c0" rx="4"/>
  <text x="490" y="460" text-anchor="middle" fill="#fff" font-size="10" font-family="sans-serif" opacity="0.4">目标: 6h</text>
  <!-- dock -->
  <rect x="80" y="498" width="440" height="80" fill="rgba(255,255,255,0.1)" rx="20"/>
  <text x="130" y="550" text-anchor="middle" fill="none" font-size="38" font-family="sans-serif">🔵</text>
  <text x="130" y="550" text-anchor="middle" font-size="36">🔵</text>
  <text x="185" y="550" text-anchor="middle" font-size="36">📁</text>
  <text x="240" y="550" text-anchor="middle" font-size="36">🌐</text>
  <text x="295" y="550" text-anchor="middle" font-size="36">✉️</text>
  <text x="350" y="550" text-anchor="middle" font-size="36">🎵</text>
  <text x="405" y="550" text-anchor="middle" font-size="36">⚙️</text>
  <text x="460" y="550" text-anchor="middle" font-size="36">🗑</text>
  <!-- dock divider -->
  <line x1="438" y1="512" x2="438" y2="570" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
</svg>
