<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <rect width="600" height="600" fill="#0f1117"/>
  <!-- AI tool logos/labels at top -->
  <text x="300" y="48" text-anchor="middle" fill="#aaa" font-size="13" font-family="monospace">5 款 AI 写作工具横评</text>
  <!-- Claude bubble -->
  <rect x="30" y="70" width="200" height="70" fill="#7c4dff" rx="14" rx="14"/>
  <text x="50" y="98" fill="#fff" font-size="13" font-weight="600" font-family="sans-serif">Claude</text>
  <rect x="50" y="108" width="160" height="5" fill="#fff" opacity="0.5" rx="2"/>
  <rect x="50" y="120" width="120" height="5" fill="#fff" opacity="0.5" rx="2"/>
  <polygon points="44,140 30,155 58,140" fill="#7c4dff"/>
  <!-- GPT-4o bubble -->
  <rect x="370" y="155" width="200" height="70" fill="#19c37d" rx="14"/>
  <text x="390" y="183" fill="#fff" font-size="13" font-weight="600" font-family="sans-serif">GPT-4o</text>
  <rect x="390" y="193" width="160" height="5" fill="#fff" opacity="0.5" rx="2"/>
  <rect x="390" y="205" width="100" height="5" fill="#fff" opacity="0.5" rx="2"/>
  <polygon points="556,225 570,240 542,225" fill="#19c37d"/>
  <!-- Gemini bubble -->
  <rect x="30" y="245" width="200" height="70" fill="#4285f4" rx="14"/>
  <text x="50" y="273" fill="#fff" font-size="13" font-weight="600" font-family="sans-serif">Gemini</text>
  <rect x="50" y="283" width="155" height="5" fill="#fff" opacity="0.5" rx="2"/>
  <rect x="50" y="295" width="110" height="5" fill="#fff" opacity="0.5" rx="2"/>
  <polygon points="44,315 30,330 58,315" fill="#4285f4"/>
  <!-- Kimi bubble -->
  <rect x="370" y="330" width="200" height="70" fill="#ff6b35" rx="14"/>
  <text x="390" y="358" fill="#fff" font-size="13" font-weight="600" font-family="sans-serif">Kimi</text>
  <rect x="390" y="368" width="145" height="5" fill="#fff" opacity="0.5" rx="2"/>
  <rect x="390" y="380" width="100" height="5" fill="#fff" opacity="0.5" rx="2"/>
  <polygon points="556,400 570,415 542,400" fill="#ff6b35"/>
  <!-- 文心 bubble -->
  <rect x="30" y="420" width="200" height="70" fill="#e0245e" rx="14"/>
  <text x="50" y="448" fill="#fff" font-size="13" font-weight="600" font-family="sans-serif">文心一言</text>
  <rect x="50" y="458" width="155" height="5" fill="#fff" opacity="0.5" rx="2"/>
  <rect x="50" y="470" width="90" height="5" fill="#fff" opacity="0.5" rx="2"/>
  <polygon points="44,490 30,505 58,490" fill="#e0245e"/>
  <!-- connecting dots -->
  <circle cx="300" cy="220" r="4" fill="#444"/>
  <circle cx="300" cy="300" r="4" fill="#444"/>
  <circle cx="300" cy="380" r="4" fill="#444"/>
  <line x1="300" y1="208" x2="300" y2="512" stroke="#333" stroke-width="2" stroke-dasharray="4,6"/>
  <!-- vs labels -->
  <text x="300" y="224" text-anchor="middle" fill="#555" font-size="11" font-family="sans-serif">vs</text>
  <text x="300" y="304" text-anchor="middle" fill="#555" font-size="11" font-family="sans-serif">vs</text>
  <text x="300" y="384" text-anchor="middle" fill="#555" font-size="11" font-family="sans-serif">vs</text>
  <text x="300" y="464" text-anchor="middle" fill="#555" font-size="11" font-family="sans-serif">vs</text>
  <!-- bottom label -->
  <text x="300" y="555" text-anchor="middle" fill="#666" font-size="12" font-family="sans-serif">真实输出截图对比</text>
</svg>
